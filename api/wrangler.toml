name = "trusty-api"
main = "src/index.js"
compatibility_date = "2025-11-01"
workers_dev = true

routes = [
  { pattern = "api.trustyai.tech", custom_domain = true }
]

[[kv_namespaces]]
binding = "SCAN_KV"
id = "2066ce5114e2480fa26bf991faeb0ef6"

# Trusty Trader (Beta) paper-trading engine — runs one cycle every 10 min.
[triggers]
crons = ["*/10 * * * *"]

[vars]
SCAN_TTL_SECONDS = "300"
