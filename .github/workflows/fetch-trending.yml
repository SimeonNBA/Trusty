name: Fetch TW Trending

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch trending from Trust Wallet API
        env:
          TW_ACCESS_ID: ${{ secrets.TW_ACCESS_ID }}
          TW_HMAC_SECRET: ${{ secrets.TW_HMAC_SECRET }}
        run: |
          cat << 'EOF' > fetch.mjs
          import crypto from 'crypto';
          import https from 'https';
          import fs from 'fs';

          const ACCESS_ID = process.env.TW_ACCESS_ID;
          const HMAC_SECRET = process.env.TW_HMAC_SECRET;

          function buildHeaders(method, path, body = '') {
            const timestamp = Math.floor(Date.now() / 1000).toString();
            const nonce = crypto.randomBytes(8).toString('hex');
            const bodyHash = body ? crypto.createHash('sha256').update(body).digest('hex') : '';
            const message = [method.toUpperCase(), path, timestamp, nonce, bodyHash].join('\n');
            const signature = crypto.createHmac('sha256', HMAC_SECRET).update(message).digest('hex');
            return {
              'Content-Type': 'application/json',
              'X-Access-Id': ACCESS_ID,
              'X-Timestamp': timestamp,
              'X-Nonce': nonce,
              'X-Signature': signature
            };
          }

          function httpsGet(path) {
            return new Promise((resolve, reject) => {
              const headers = buildHeaders('GET', path);
              const options = {
                hostname: 'api.tw-wallet.com',
                path,
                method: 'GET',
                headers
              };
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { resolve({ raw: data }); }
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          // Fetch multiple categories
          const categories = ['memes', 'bnb', 'sol', 'ai', 'pumpfun'];
          const results = {};

          for (const cat of categories) {
            try {
              const path = `/v1/trending?category=${cat}&sort=price_change&limit=10`;
              const data = await httpsGet(path);
              results[cat] = data;
              console.log(`Fetched ${cat}:`, JSON.stringify(data).slice(0, 100));
            } catch(e) {
              console.error(`Failed ${cat}:`, e.message);
              results[cat] = { error: e.message };
            }
          }

          // Save with timestamp
          const output = {
            updatedAt: new Date().toISOString(),
            categories: results
          };

          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/trending.json', JSON.stringify(output, null, 2));
          console.log('Saved data/trending.json');
          EOF
          node fetch.mjs

      - name: Commit and push trending data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json
          git diff --staged --quiet || git commit -m "chore: update trending data"
          git push
