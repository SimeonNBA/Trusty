name: Fetch Trending Tokens

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch trending via DexScreener
        run: |
          mkdir -p data

          node << 'SCRIPT'
          const fs = require('fs');

          // Quality thresholds — Trusty is a SAFETY product. Surfacing
          // $7K-mcap dust as "trending" undermines the brand. These cutoffs
          // exclude untradeable / scam-prone / brand-new pairs while still
          // leaving plenty of real meme-tier tokens to surface.
          const MIN_LIQUIDITY = 20000;   // $20K — tradeable without 50% slippage
          const MIN_MCAP      = 50000;   // $50K — above pure-scam-dust band
          const MIN_VOLUME    = 5000;    // $5K  — proves it's actually traded

          function passesQuality(p) {
            return (p.liquidity?.usd || 0) >= MIN_LIQUIDITY
                && (p.fdv || 0) >= MIN_MCAP
                && (p.volume?.h24 || 0) >= MIN_VOLUME;
          }

          async function fetchCategory(query, chainId) {
            try {
              const res = await fetch('https://api.dexscreener.com/latest/dex/search?q=' + encodeURIComponent(query));
              const data = await res.json();
              if (!data.pairs) return [];
              return data.pairs
                .filter(p => !chainId || p.chainId === chainId)
                .filter(passesQuality)
                .sort((a, b) => (b.priceChange?.h24 || 0) - (a.priceChange?.h24 || 0))
                .slice(0, 10)
                .map(p => ({
                  name: p.baseToken.name,
                  symbol: p.baseToken.symbol,
                  assetId: p.baseToken.address,
                  chain: p.chainId,
                  priceUsd: parseFloat(p.priceUsd) || 0,
                  marketCapUsd: p.fdv || 0,
                  priceChange24h: p.priceChange?.h24 || 0,
                  volume24h: p.volume?.h24 || 0,
                  liquidity: p.liquidity?.usd || 0,
                  logoUrl: p.info?.imageUrl || null,
                  pairAddress: p.pairAddress
                }));
            } catch(e) { console.error('Error fetching ' + query + ':', e.message); return []; }
          }

          async function fetchTrustyPinned() {
            // Fetch live $TRUSTY data from Dexscreener so the pinned row
            // shows real price / mcap / volume, not stale hardcoded values.
            // Returns null on failure — the renderer falls back to no pin
            // rather than rendering broken data.
            const TRUSTY_CA = '0x65aea108c21439693468fcd542d81c29e8df4444';
            try {
              const res = await fetch('https://api.dexscreener.com/latest/dex/tokens/' + TRUSTY_CA);
              const data = await res.json();
              if (!data.pairs || !data.pairs[0]) return null;
              // Prefer the highest-liquidity pair on BSC.
              const bscPairs = data.pairs.filter(p => p.chainId === 'bsc');
              const p = (bscPairs.length ? bscPairs : data.pairs)
                .sort((a, b) => (b.liquidity?.usd || 0) - (a.liquidity?.usd || 0))[0];
              return {
                // Display name is "Trusty AI" — the project's brand name.
                // On-chain .name() is "TWT Mascot" (community legacy, immutable),
                // but every Trusty surface (site, popup, listings) uses "Trusty AI"
                // for consistency and to avoid Trust Wallet brand association.
                name: 'Trusty AI',
                symbol: p.baseToken.symbol,
                assetId: p.baseToken.address,
                chain: p.chainId,
                priceUsd: parseFloat(p.priceUsd) || 0,
                marketCapUsd: p.fdv || 0,
                priceChange24h: p.priceChange?.h24 || 0,
                volume24h: p.volume?.h24 || 0,
                liquidity: p.liquidity?.usd || 0,
                logoUrl: p.info?.imageUrl || null,
                pairAddress: p.pairAddress,
                pinned: true,
              };
            } catch(e) {
              console.error('Trusty pin fetch error:', e.message);
              return null;
            }
          }

          async function main() {
            console.log('Fetching trending data...');

            const [memes, bnb, eth, sol, ai, pumpfun, trustyPin] = await Promise.all([
              fetchCategory('meme', 'bsc'),
              fetchCategory('bnb bsc', 'bsc'),
              fetchCategory('eth ethereum', 'ethereum'),
              fetchCategory('solana sol', 'solana'),
              fetchCategory('ai agent', 'bsc'),
              fetchCategory('pump fun', 'solana'),
              fetchTrustyPinned(),
            ]);

            // Also fetch top movers from DexScreener token boosts.
            // Boosts = currently-promoted tokens, a better trending signal
            // than the open search endpoint for chains with weak keyword
            // queries (notably ETH, where "eth ethereum" returns mostly
            // wrapped-asset noise). We hit /token-boosts/top, filter per
            // chain, hydrate each token via /latest/dex/tokens, gate on
            // the same quality thresholds as fetchCategory, then merge.
            async function mergeBoostsInto(target, chainId, limit) {
              try {
                const res = await fetch('https://api.dexscreener.com/token-boosts/top/v1');
                const data = await res.json();
                if (!Array.isArray(data)) return;
                const movers = data.filter(t => t.chainId === chainId).slice(0, limit);
                for (const t of movers) {
                  const lowerAddr = (t.tokenAddress || '').toLowerCase();
                  if (!lowerAddr) continue;
                  if (target.find(b => (b.assetId || '').toLowerCase() === lowerAddr)) continue;
                  try {
                    const pRes = await fetch('https://api.dexscreener.com/latest/dex/tokens/' + t.tokenAddress);
                    const pData = await pRes.json();
                    if (!pData.pairs || !pData.pairs[0]) continue;
                    // Prefer the highest-liquidity pair on the target chain.
                    const chainPairs = pData.pairs.filter(p => p.chainId === chainId);
                    const p = (chainPairs.length ? chainPairs : pData.pairs)
                      .sort((a, b) => (b.liquidity?.usd || 0) - (a.liquidity?.usd || 0))[0];
                    if (!passesQuality(p)) continue;
                    target.push({
                      name: p.baseToken.name,
                      symbol: p.baseToken.symbol,
                      assetId: p.baseToken.address,
                      chain: p.chainId,
                      priceUsd: parseFloat(p.priceUsd) || 0,
                      marketCapUsd: p.fdv || 0,
                      priceChange24h: p.priceChange?.h24 || 0,
                      volume24h: p.volume?.h24 || 0,
                      liquidity: p.liquidity?.usd || 0,
                      logoUrl: p.info?.imageUrl || null,
                      pairAddress: p.pairAddress
                    });
                  } catch(_) {}
                }
              } catch(e) { console.error('Boosts merge error for ' + chainId + ':', e.message); }
            }

            await mergeBoostsInto(bnb, 'bsc', 15);
            await mergeBoostsInto(eth, 'ethereum', 20); // ETH leans heavily on boosts since search is weak
            await mergeBoostsInto(sol, 'solana', 15);

            // Dedupe each category by token address. Dexscreener's
            // /search endpoint can return multiple LP pairs for the same
            // token (e.g. two $SATO entries from different pair contracts),
            // which renders as visible duplicates. Keep the first occurrence
            // of each assetId — preserves the more-liquid pair since search
            // results are roughly liquidity-sorted upstream.
            function dedupeByAssetId(arr) {
              const seen = new Set();
              const out = [];
              for (const item of arr) {
                const key = (item.assetId || '').toLowerCase();
                if (!key || seen.has(key)) continue;
                seen.add(key);
                out.push(item);
              }
              arr.length = 0;
              arr.push(...out);
            }
            [memes, bnb, eth, sol, ai, pumpfun].forEach(dedupeByAssetId);

            // Sort all by 24h price change
            [memes, bnb, eth, sol, ai, pumpfun].forEach(arr => {
              arr.sort((a, b) => (b.priceChange24h || 0) - (a.priceChange24h || 0));
              arr.splice(10); // keep top 10
            });

            // Pin $TRUSTY at position 0 of BNB category.
            // - Done AFTER sort/splice so the pin can't be dropped by ranking.
            // - Dedupe in case Dexscreener already returned Trusty organically.
            // - If the live fetch failed (trustyPin is null), skip silently —
            //   the BNB list still renders, just without the pin.
            if (trustyPin) {
              const trustyCaLower = trustyPin.assetId.toLowerCase();
              const dedupedBnb = bnb.filter(t => (t.assetId || '').toLowerCase() !== trustyCaLower);
              dedupedBnb.unshift(trustyPin);
              bnb.length = 0;
              bnb.push(...dedupedBnb);
            }

            const output = {
              updatedAt: new Date().toISOString(),
              categories: { memes, bnb, eth, sol, ai, pumpfun }
            };

            fs.writeFileSync('data/trending.json', JSON.stringify(output, null, 2));
            console.log('Saved trending.json');
            console.log('Memes:', memes.length, '| BNB:', bnb.length, '| ETH:', eth.length, '| SOL:', sol.length, '| AI:', ai.length, '| PumpFun:', pumpfun.length);
          }

          main().catch(console.error);
          SCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json
          git diff --staged --quiet || git commit -m "chore: update trending data"
          git push
