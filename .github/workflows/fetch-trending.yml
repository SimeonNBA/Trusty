name: Fetch TW Trending

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TWAK CLI
        run: npm install -g @trustwallet/cli

      - name: Init TWAK credentials
        env:
          TW_ACCESS_ID: ${{ secrets.TW_ACCESS_ID }}
          TW_HMAC_SECRET: ${{ secrets.TW_HMAC_SECRET }}
        run: |
          twak init --api-key "$TW_ACCESS_ID" --api-secret "$TW_HMAC_SECRET"

      - name: Fetch trending data
        run: |
          mkdir -p data

          echo "Fetching memes..."
          twak trending --category memes --sort price_change --limit 10 --json > data/cat_memes.json 2>&1 || echo "{}" > data/cat_memes.json

          echo "Fetching bnb..."
          twak trending --category bnb --sort price_change --limit 10 --json > data/cat_bnb.json 2>&1 || echo "{}" > data/cat_bnb.json

          echo "Fetching sol..."
          twak trending --category sol --sort price_change --limit 10 --json > data/cat_sol.json 2>&1 || echo "{}" > data/cat_sol.json

          echo "Fetching ai..."
          twak trending --category ai --sort price_change --limit 10 --json > data/cat_ai.json 2>&1 || echo "{}" > data/cat_ai.json

          echo "Fetching pumpfun..."
          twak trending --category pumpfun --sort price_change --limit 10 --json > data/cat_pumpfun.json 2>&1 || echo "{}" > data/cat_pumpfun.json

          echo "Done fetching categories"
          cat data/cat_memes.json | head -5

      - name: Combine into trending.json
        run: |
          node << 'EOF'
          const fs = require('fs');

          function safeRead(file) {
            try {
              const content = fs.readFileSync(file, 'utf8').trim();
              return JSON.parse(content);
            } catch(e) {
              return { error: 'parse failed' };
            }
          }

          const output = {
            updatedAt: new Date().toISOString(),
            categories: {
              memes:   safeRead('data/cat_memes.json'),
              bnb:     safeRead('data/cat_bnb.json'),
              sol:     safeRead('data/cat_sol.json'),
              ai:      safeRead('data/cat_ai.json'),
              pumpfun: safeRead('data/cat_pumpfun.json')
            }
          };

          fs.writeFileSync('data/trending.json', JSON.stringify(output, null, 2));
          console.log('Combined trending.json saved');
          console.log('Preview:', JSON.stringify(output).slice(0, 300));
          EOF

          # Clean up temp files
          rm -f data/cat_*.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json
          git diff --staged --quiet || git commit -m "chore: update trending data"
          git push
