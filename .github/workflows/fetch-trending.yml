name: Fetch TW Trending

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch trending from Trust Wallet API
        env:
          TW_ACCESS_ID: ${{ secrets.TW_ACCESS_ID }}
          TW_HMAC_SECRET: ${{ secrets.TW_HMAC_SECRET }}
        run: |
          cat << 'EOF' > fetch.mjs
          import crypto from 'crypto';
          import https from 'https';
          import fs from 'fs';

          const ACCESS_ID = process.env.TW_ACCESS_ID;
          const HMAC_SECRET = process.env.TW_HMAC_SECRET;
          const BASE_URL = 'tws.trustwallet.com';

          function makeRequest(path, query = '') {
            return new Promise((resolve, reject) => {
              const method = 'GET';
              const nonce = crypto.randomUUID().replace(/-/g, '');
              const date = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
              const sigInput = `${method}${path}${query}${ACCESS_ID}${nonce}${date}`;
              const signature = crypto
                .createHmac('sha256', HMAC_SECRET)
                .update(sigInput)
                .digest('base64');

              const fullPath = query ? `${path}?${query}` : path;
              const options = {
                hostname: BASE_URL,
                path: fullPath,
                method: 'GET',
                headers: {
                  'Content-Type': 'application/json',
                  'X-TW-Credential': ACCESS_ID,
                  'X-TW-Nonce': nonce,
                  'X-TW-Date': date,
                  'Authorization': signature
                }
              };

              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log(`${path} → HTTP ${res.statusCode}`);
                  try { resolve({ status: res.statusCode, body: JSON.parse(data) }); }
                  catch(e) { resolve({ status: res.statusCode, body: data }); }
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          // Fetch trending meme coins across categories
          const categories = ['memes', 'bnb', 'sol', 'ai', 'pumpfun'];
          const results = {};

          for (const cat of categories) {
            try {
              const res = await makeRequest(
                '/v1/trending',
                `category=${cat}&sort=price_change&limit=10`
              );
              results[cat] = res.body;
              console.log(`${cat}:`, JSON.stringify(res.body).slice(0, 120));
            } catch(e) {
              console.error(`Failed ${cat}:`, e.message);
              results[cat] = { error: e.message };
            }
          }

          const output = {
            updatedAt: new Date().toISOString(),
            categories: results
          };

          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/trending.json', JSON.stringify(output, null, 2));
          console.log('Saved data/trending.json');
          EOF
          node fetch.mjs

      - name: Commit and push trending data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json
          git diff --staged --quiet || git commit -m "chore: update trending data"
          git push
