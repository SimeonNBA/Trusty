name: Fetch Trending Tokens

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch trending via DexScreener
        run: |
          mkdir -p data

          node << 'SCRIPT'
          const fs = require('fs');

          async function fetchCategory(query, chainId) {
            try {
              const res = await fetch('https://api.dexscreener.com/latest/dex/search?q=' + encodeURIComponent(query));
              const data = await res.json();
              if (!data.pairs) return [];
              return data.pairs
                .filter(p => !chainId || p.chainId === chainId)
                .sort((a, b) => (b.priceChange?.h24 || 0) - (a.priceChange?.h24 || 0))
                .slice(0, 10)
                .map(p => ({
                  name: p.baseToken.name,
                  symbol: p.baseToken.symbol,
                  assetId: p.baseToken.address,
                  chain: p.chainId,
                  priceUsd: parseFloat(p.priceUsd) || 0,
                  marketCapUsd: p.fdv || 0,
                  priceChange24h: p.priceChange?.h24 || 0,
                  volume24h: p.volume?.h24 || 0,
                  liquidity: p.liquidity?.usd || 0,
                  logoUrl: p.info?.imageUrl || null,
                  pairAddress: p.pairAddress
                }));
            } catch(e) { console.error('Error fetching ' + query + ':', e.message); return []; }
          }

          async function main() {
            console.log('Fetching trending data...');

            const [memes, bnb, sol, ai, pumpfun] = await Promise.all([
              fetchCategory('meme', 'bsc'),
              fetchCategory('bnb bsc', 'bsc'),
              fetchCategory('solana sol', 'solana'),
              fetchCategory('ai agent', 'bsc'),
              fetchCategory('pump fun', 'solana'),
            ]);

            // Also fetch top movers from DexScreener token boosts
            let topMovers = [];
            try {
              const res = await fetch('https://api.dexscreener.com/token-boosts/top/v1');
              const data = await res.json();
              if (Array.isArray(data)) {
                const bscMovers = data.filter(t => t.chainId === 'bsc').slice(0, 10);
                const solMovers = data.filter(t => t.chainId === 'solana').slice(0, 10);
                // Enhance BNB category with boosted tokens
                for (const t of bscMovers) {
                  if (!bnb.find(b => b.address === t.tokenAddress)) {
                    try {
                      const pRes = await fetch('https://api.dexscreener.com/latest/dex/tokens/' + t.tokenAddress);
                      const pData = await pRes.json();
                      if (pData.pairs && pData.pairs[0]) {
                        const p = pData.pairs[0];
                        bnb.push({
                          name: p.baseToken.name,
                          symbol: p.baseToken.symbol,
                          assetId: p.baseToken.address,
                          chain: p.chainId,
                          priceUsd: parseFloat(p.priceUsd) || 0,
                          marketCapUsd: p.fdv || 0,
                          priceChange24h: p.priceChange?.h24 || 0,
                          volume24h: p.volume?.h24 || 0,
                          liquidity: p.liquidity?.usd || 0,
                          logoUrl: p.info?.imageUrl || null,
                          pairAddress: p.pairAddress
                        });
                      }
                    } catch(e) {}
                  }
                }
              }
            } catch(e) { console.error('Boosts error:', e.message); }

            // Sort all by 24h price change
            [memes, bnb, sol, ai, pumpfun].forEach(arr => {
              arr.sort((a, b) => (b.priceChange24h || 0) - (a.priceChange24h || 0));
              arr.splice(10); // keep top 10
            });

            const output = {
              updatedAt: new Date().toISOString(),
              categories: { memes, bnb, sol, ai, pumpfun }
            };

            fs.writeFileSync('data/trending.json', JSON.stringify(output, null, 2));
            console.log('Saved trending.json');
            console.log('Memes:', memes.length, '| BNB:', bnb.length, '| SOL:', sol.length, '| AI:', ai.length, '| PumpFun:', pumpfun.length);
          }

          main().catch(console.error);
          SCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json
          git diff --staged --quiet || git commit -m "chore: update trending data"
          git push
